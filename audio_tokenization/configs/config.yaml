defaults:
  - dataset: audio_only/audioset
  - _self_

# Pipeline settings
output_dir: /capstor/store/cscs/swissai/infra01/audio-datasets/tokenized

mode: audio_only                      # audio_only, audio_text

# Tokenizer settings
tokenizer:
  path: /capstor/store/cscs/swissai/infra01/MLLM/tokenizer/apertus_emu3.5_wavtok  # Required: path to omni_tokenizer (must have audio tokens added)
  sampling_rate: 24000                                                 # Target sampling rate for decoding/resampling
  torch_compile: false
  trim_last_tokens: 5              # Trim trailing tokens from padded audio (0 to disable)

# Filtering
min_sample_rate: 16000

# Resume
resume: false

# Weights & Biases logging
wandb:
  enabled: true
  log_interval_seconds: 1  # Live logging interval (seconds)
  project: audio-tokenization
  entity: null             # W&B team/username, null = default
  name: null               # Run name, null = auto-generated
  tags: []                 # Optional tags for filtering runs
