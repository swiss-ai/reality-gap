defaults:
  - dataset: audioset_lhotse
  - _self_

# Pipeline settings
output_dir: /capstor/store/cscs/swissai/infra01/audio-datasets/tokenized

num_gpus: ???
device: cuda
mode: audio_only                      # audio_only, audio2text, text2audio, sft
shard_assignment: shared              # shared (queue-based) or static (pre-assigned shards)
decode_workers_per_gpu: 16            # multiprocessing decode/resample per GPU worker
dataloader_prefetch_factor: 8         # prefetch batches per worker (higher hides decode/resample latency)
batch_size: 12                        # Batch size for tokenization (use with bucket filtering for same-length batches)

# Ray config (for multi-node)
ray:
  address: null         # e.g. "10.0.0.1:6379" or "auto"; null = local
  redis_password: null  # set if your cluster requires it
  namespace: null       # optional Ray namespace

# Tokenizer settings
tokenizer:
  path: /capstor/store/cscs/swissai/infra01/MLLM/tokenizer/apertus_emu3.5_wavtok  # Required: path to omni_tokenizer (must have audio tokens added)
  sampling_rate: 24000                                                 # Target sampling rate for decoding/resampling
  torch_compile: false
  trim_last_tokens: 5              # Trim trailing tokens from padded audio (0 to disable)

# Filtering
min_sample_rate: 16000

# Resume
resume: false

# Merge rank/chunk .bin/.idx into one indexed dataset after tokenization
# Not implemented yet
merge: false

# Weights & Biases logging
wandb:
  enabled: true
  live: true               # If true, log live progress from a dedicated Ray actor
  log_interval_seconds: 1  # Live logging interval (seconds)
  project: audio-tokenization
  entity: null             # W&B team/username, null = default
  name: null               # Run name, null = auto-generated
  tags: []                 # Optional tags for filtering runs
