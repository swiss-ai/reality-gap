# Lhotse pipeline config for AudioSet tokenization.
# Requires pre-built Shar data (run prepare_hf_to_shar first).
dataset_type: lhotse
dataset_name: agkphysics/AudioSet
dataset_split: unbal_train

# Pre-built Shar directory (from prepare_hf_to_shar)
shar_dir: /iopsstor/scratch/cscs/xyixuan/audio-datasets/audioset_unbal_train_shar
shar_index_filename: shar_index.json

# Filtering
min_duration: 2.0
max_duration: 200.0
min_sample_rate: 16000

# Dynamic bucketing sampler
max_batch_duration: 2000.0
max_batch_cuts: null
num_buckets: 20
bucket_buffer_size: 20000
sampler_shuffle: true
sampler_seed: 42

# DataLoader (144 CPUs per rank on GH200)
num_workers: 32
prefetch_factor: 4

# Checkpointing
checkpoint_interval_batches: 500

max_samples: null
