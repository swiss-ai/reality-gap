# Emilia-YODAS isolated — audio-text tokenization.
dataset_name: emilia_yodas
output_name: emilia_yodas_isolated
clip_id_parser: emilia

shar_dir:
  - /iopsstor/scratch/cscs/xyixuan/audio-datasets/emilia_yodas_isolated_shar
shar_index_filename: shar_index.json

# Filtering
min_duration: 2.0
max_duration: 200.0
min_sample_rate: 16000

max_batch_duration: 2000.0
num_buckets: 20
bucket_buffer_size: 20000
sampler_shuffle: true
sampler_seed: 42

num_workers: 32
prefetch_factor: 4

checkpoint_interval_batches: 500
