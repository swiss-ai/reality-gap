# Lhotse pipeline config for Emilia-YODAS audio-text interleaved tokenization.
# Requires pre-built Shar data with text supervisions.
dataset_type: lhotse
dataset_name: emilia_yodas
output_name: emilia_yodas
clip_id_parser: emilia

# Pre-built Shar directories (from prepare_hf_to_shar)
shar_dir:
  - /path/to/emilia_DE_shar
  - /path/to/emilia_EN_shar
  - /path/to/emilia_FR_shar
  - /path/to/emilia_JA_shar
  - /path/to/emilia_KO_shar
  - /path/to/emilia_ZH_shar

# Dynamic bucketing sampler
max_batch_duration: 1500.0
num_buckets: 20
bucket_buffer_size: 20000
sampler_shuffle: true
sampler_seed: 42

# DataLoader
num_workers: 4
prefetch_factor: 4

# Checkpointing
checkpoint_interval_batches: 500
