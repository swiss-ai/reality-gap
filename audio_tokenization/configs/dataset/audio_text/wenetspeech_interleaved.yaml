# WenetSpeech L-split interleaved — audio-text tokenization.
dataset_name: wenetspeech
output_name: wenetspeech_interleaved
clip_id_parser: wenetspeech

shar_dir:
  - /capstor/store/cscs/swissai/infra01/audio-datasets/SHAR/stage_2/wenetspeech_24k
