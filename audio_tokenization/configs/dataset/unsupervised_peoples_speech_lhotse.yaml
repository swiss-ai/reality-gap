# Dynamic bucketing sampler
# max_batch_duration = total audio seconds per batch. Profiling shows:
#   600s → ~300 audio_s/s, ~4 GB     (conservative)
#  1500s → ~700 audio_s/s, ~22 GB    (2.3x throughput, safe on GH200 80GB)
#  3000s → ~1100 audio_s/s, ~44 GB   (3.7x, aggressive)
max_batch_duration: 1000.0
max_batch_cuts: null
num_buckets: 20
bucket_buffer_size: 20000
sampler_shuffle: true
sampler_seed: 42

# DataLoader prefetching (CPU decode overlaps GPU tokenization)
num_workers: 32
prefetch_factor: 4

# Micro-shard checkpointing interval (in batches)
checkpoint_interval_batches: 2000

# Duration filters (must match VAD chunking: min_chunk=5s, max_chunk=200s)
min_duration: 5.0
max_duration: 200.0

# Hard-drop audio below 16kHz before resampling to target SR.
# 16kHz→24kHz upsampling is fine (Nyquist 8kHz covers speech).
# 8kHz→24kHz produces garbage — drop it.
min_sample_rate: 16000

# Optional post-tokenization silence filter
# silence_unique_threshold: 5

max_samples: null
