# Lhotse pipeline config for People's Speech tokenization.
# Requires pre-built Shar data (run prepare_wds_to_shar first).
dataset_type: lhotse
dataset_name: unsupervised_peoples_speech
output_name: ups_all_lang_vad_v2

# Pre-built Shar directories (from prepare_wds_to_shar with VAD segmentation)
# Supports a single path or a list of paths.
# Each node_XX dir was produced by a separate SLURM rank and has its own shar_index.json.
shar_dir:
  - /iopsstor/scratch/cscs/xyixuan/audio-datasets/shar/ups_all_lang_shar_v2/node_00
  - /iopsstor/scratch/cscs/xyixuan/audio-datasets/shar/ups_all_lang_shar_v2/node_01
