# Lhotse pipeline config for Gemeinderat (Swiss German) tokenization.
# Requires pre-built Shar data (run prepare_wds_to_shar first).
dataset_type: lhotse
dataset_name: gemeinderat_zurich
output_name: gemeinderat_zurich

# Pre-built Shar directory (from prepare_wds_to_shar)
shar_dir: /iopsstor/scratch/cscs/xyixuan/audio-datasets/gemeinderat_shar
shar_index_filename: shar_index.json

# Filtering
min_duration: 1.0
max_duration: 200.0
min_sample_rate: 16000

# Dynamic bucketing sampler
max_batch_duration: 2500.0
max_batch_cuts: null
num_buckets: 20
bucket_buffer_size: 20000
sampler_shuffle: true
sampler_seed: 42

# DataLoader
num_workers: 32
prefetch_factor: 6

# Checkpointing
checkpoint_interval_batches: 1000

max_samples: null
