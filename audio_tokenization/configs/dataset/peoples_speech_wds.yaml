# WebDataset (tar shards) config for People's Speech unsupervised set
dataset_type: wds
dataset_name: unsupervised_peoples_speech_commercial
dataset_split: train

# Tar shard locations (glob patterns)
shards:
  - /iopsstor/scratch/cscs/xyixuan/audio-datasets/unsupervised_peoples_speech_commercial_wds/audio/*.tar
  - /iopsstor/scratch/cscs/xyixuan/audio-datasets/unsupervised_peoples_speech_commercial_wds/audio2/*.tar

# Audio keys/extensions inside shards (without dot)
audio_extensions: [mp3]

# Precomputed metadata for fast filtering (optional)
# Can be either:
#   - Path to directory with per-shard .tsv files (recommended, loads lazily)
#   - Path to single .tsv file (loads all upfront)
# Generated by: studys/multimodal-data/01-dataset-download/unsupervised_peoples_speech/precompute_metadata.py
metadata_dir: /iopsstor/scratch/cscs/xyixuan/audio-datasets/unsupervised_peoples_speech_commercial_wds/metadata/shards

# Per-worker buffer size (for batching); defaults to batch_size if unset
buffer_size: null

# Optional: truncate to fixed length for efficient batching (samples @ 24kHz)
# target_bucket: 240000

# Optional: skip near-silence samples by unique audio token count
# silence_unique_threshold: 5

max_samples: null
