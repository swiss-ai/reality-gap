# Lhotse pipeline config for CommonVoice zh-CN (other split) tokenization.
# Requires pre-built Shar data.
dataset_type: lhotse
output_name: commonvoice_zh-CN_other

# Pre-built Shar directory
shar_dir: /iopsstor/scratch/cscs/xyixuan/audio-datasets/shar/commonvoice_zh-CN_other_shar
shar_index_filename: shar_index.json

# Filtering
min_duration: 4.0
max_duration: 500.0
min_sample_rate: 16000

# Dynamic bucketing sampler
max_batch_duration: 1000.0
max_batch_cuts: null
num_buckets: 20
bucket_buffer_size: 20000
sampler_shuffle: true
sampler_seed: 42

# DataLoader
num_workers: 32
prefetch_factor: 4

# Checkpointing
checkpoint_interval_batches: 5000

max_samples: null
