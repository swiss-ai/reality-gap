# AudioSet balanced train — small test set for regression testing.
dataset_type: lhotse
output_name: audioset_bal_train

# Pre-built Shar directory
shar_dir: /iopsstor/scratch/cscs/xyixuan/audio-datasets/audio_only_shar/audioset_bal_train_audio_only
shar_index_filename: shar_index.json

# Filtering
min_duration: 2.0
max_duration: 200.0
min_sample_rate: 16000

# Dynamic bucketing sampler
max_batch_duration: 1500.0
num_buckets: 20
bucket_buffer_size: 20000
sampler_shuffle: true
sampler_seed: 42

# DataLoader
num_workers: 4
prefetch_factor: 4

# Checkpointing
checkpoint_interval_batches: 500
